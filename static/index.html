<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#000000" />
  <title>Focus OS</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="stylesheet" href="/static/styles.css" />
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
</head>
<body>
  <!-- ===== Великий заголовок зверху (large title) ===== -->
  <header class="large-title-bar">
    <h1 id="page-title">Focus</h1>
  </header>

  <!-- ===== Екран: Таймер ===== -->
  <section id="screen-timer" class="screen active">
    <div class="timer-wrap">
      <svg class="ring" viewBox="0 0 280 280">
        <circle class="ring-bg" cx="140" cy="140" r="126" />
        <circle class="ring-fg" id="ring-fg" cx="140" cy="140" r="126" />
      </svg>
      <div class="timer-center">
        <div class="time-display" id="time-display">25:00</div>
        <div class="phase-label" id="phase-label">Натисни, щоб почати</div>
      </div>
    </div>

    <div class="modes" id="modes">
      <button class="mode-btn active" data-mode="focus">
        <span class="mode-name">Фокус</span>
        <span class="mode-dur">25 хв</span>
      </button>
      <button class="mode-btn" data-mode="deep_work">
        <span class="mode-name">Глибока</span>
        <span class="mode-dur">50 хв</span>
      </button>
      <button class="mode-btn" data-mode="short">
        <span class="mode-name">Коротка</span>
        <span class="mode-dur">15 хв</span>
      </button>
      <button class="mode-btn" data-mode="break">
        <span class="mode-name">Перерва</span>
        <span class="mode-dur">5 хв</span>
      </button>
    </div>
  </section>

  <!-- ===== Екран: Статистика ===== -->
  <section id="screen-stats" class="screen">
    <div class="stats-scroll">
      <div class="stat-cards">
        <div class="stat-card highlight">
          <div class="stat-value" id="stat-today">0 хв</div>
          <div class="stat-label">Сьогодні</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-total">0 хв</div>
          <div class="stat-label">Усього</div>
        </div>
        <div class="stat-card">
          <div class="stat-value" id="stat-sessions">0</div>
          <div class="stat-label">Сесій</div>
        </div>
      </div>

      <h2 class="group-title">За режимами</h2>
      <div id="stats-by-mode" class="list-group"></div>

      <h2 class="group-title">Нещодавні сесії</h2>
      <div id="stats-recent" class="list-group"></div>
    </div>
  </section>

  <!-- ===== Екран: Музика ===== -->
  <section id="screen-music" class="screen">
    <div class="music-scroll" id="track-list"></div>
  </section>

  <!-- ===== Плаваюча кнопка дії (Старт/Пауза) ===== -->
  <button class="fab" id="start-btn" aria-label="Старт">
    <svg id="fab-icon" viewBox="0 0 24 24" width="28" height="28"><path d="M8 5v14l11-7z"/></svg>
  </button>

  <!-- ===== Нижній таб-бар ===== -->
  <nav class="tabbar">
    <button class="tab active" data-screen="timer">
      <svg viewBox="0 0 24 24" width="24" height="24"><circle cx="12" cy="13" r="8" fill="none" stroke="currentColor" stroke-width="1.8"/><path d="M12 9v4l2.5 2.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" fill="none"/><path d="M9 2h6M9 4h6" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <span>Таймер</span>
    </button>
    <button class="tab" data-screen="stats">
      <svg viewBox="0 0 24 24" width="24" height="24"><rect x="4" y="11" width="4" height="9" rx="1" fill="currentColor"/><rect x="10" y="6" width="4" height="14" rx="1" fill="currentColor"/><rect x="16" y="9" width="4" height="11" rx="1" fill="currentColor"/></svg>
      <span>Статистика</span>
    </button>
    <button class="tab" data-screen="music">
      <svg viewBox="0 0 24 24" width="24" height="24"><path d="M9 18V5l10-2v13" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/><circle cx="7" cy="18" r="2.5" fill="currentColor"/><circle cx="17" cy="16" r="2.5" fill="currentColor"/></svg>
      <span>Музика</span>
    </button>
  </nav>

  <!-- ===== Контекстний плеєр ===== -->
  <div class="player hidden" id="player">
    <div class="player-art" id="player-art">
      <svg viewBox="0 0 24 24" width="22" height="22"><circle cx="12" cy="12" r="9" fill="none" stroke="currentColor" stroke-width="1.6"/><circle cx="12" cy="12" r="1.5" fill="currentColor"/></svg>
    </div>
    <div class="player-info">
      <div class="player-title" id="player-title">—</div>
      <div class="player-author" id="player-author"></div>
    </div>
    <button class="player-btn" id="player-play" aria-label="Пауза">
      <svg viewBox="0 0 24 24" width="20" height="20"><path d="M6 5h4v14H6zM14 5h4v14h-4z"/></svg>
    </button>
    <button class="player-btn" id="player-stop" aria-label="Закрити">
      <svg viewBox="0 0 24 24" width="18" height="18"><path d="M6 6l12 12M18 6L6 18" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
    </button>
  </div>

  <!-- ===== Модал: додати трек ===== -->
  <div class="modal hidden" id="add-modal">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-row">
        <button class="sheet-btn ghost" id="btn-close-modal">Скасувати</button>
        <h3>Новий трек</h3>
        <div style="width:64px"></div>
      </div>

      <div class="segmented">
        <button class="seg active" data-tab="url">Посилання</button>
        <button class="seg" data-tab="upload" id="tab-upload">Файл</button>
      </div>

      <div class="pane active" id="pane-url">
        <input type="text" id="track-url" placeholder="https://... або YouTube" autocomplete="off" />
        <input type="text" id="track-title" placeholder="Назва (заповниться автоматично)" autocomplete="off" />
        <input type="text" id="track-author" placeholder="Виконавець" autocomplete="off" />
        <div class="scope-row" id="scope-row">
          <label class="seg-choice"><input type="radio" name="scope" value="user" checked /><span>Для мене</span></label>
          <label class="seg-choice" id="scope-admin-label"><input type="radio" name="scope" value="admin" /><span>Для всіх</span></label>
        </div>
        <button class="primary-btn" id="btn-save-url">Додати</button>
      </div>

      <div class="pane" id="pane-upload">
        <p class="hint">MP3 / WAV / OGG, до 25 МБ. Зберігається у хмарі.</p>
        <label class="file-label" for="track-file">Обрати файл</label>
        <input type="file" id="track-file" accept="audio/*" hidden />
        <span class="file-name" id="file-name"></span>
        <input type="text" id="upload-title" placeholder="Назва" autocomplete="off" />
        <input type="text" id="upload-author" placeholder="Виконавець" autocomplete="off" />
        <div class="scope-row">
          <label class="seg-choice"><input type="radio" name="scope2" value="user" checked /><span>Для мене</span></label>
          <label class="seg-choice" id="scope-admin-label2"><input type="radio" name="scope2" value="admin" /><span>Для всіх</span></label>
        </div>
        <button class="primary-btn" id="btn-upload">Завантажити</button>
        <div class="upload-status hidden" id="upload-status"></div>
      </div>
    </div>
  </div>

  <!-- ===== Тост-сповіщення ===== -->
  <div class="toast hidden" id="toast"></div>

  <audio id="audio-el" preload="none"></audio>
  <div id="yt-container" class="hidden"></div>

  <script src="/static/api.js"></script>
  <script src="/static/app.js"></script>
</body>
</html>
